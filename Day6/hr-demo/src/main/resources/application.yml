spring:
  application:
    name: hr-demo
  devtools:
    restart:
      enabled: true
  messages:
    basename: "i18n/messages, config.i18n.messages"

server:
  port: 8080

logging:
  file:
    name: ${logging.file.path}/hr-demo.log
    path: logs
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10
      
management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include:
        - '*'