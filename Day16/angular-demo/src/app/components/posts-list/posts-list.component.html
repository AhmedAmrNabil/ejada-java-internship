<main class="flex flex-col items-center justify-center min-h-screen bg-background text-foreground">
  <h1 class="text-2xl font-bold my-4">Posts List</h1>
  <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-4">
    @if (posts$ | async; as posts) {
      @for (post of posts; track post.id) {
        <article
          class="relative isolate bg-card rounded-lg shadow-md p-4 hover:shadow-lg transition-shadow duration-300"
        >
          <h2 class="text-lg font-semibold mb-2">
            <a [routerLink]="['/posts', post.id]">
              <span class="absolute inset-0 z-10 rounded-lg"></span>
              {{ post.title }}
            </a>
          </h2>
          <p class="text-muted-foreground mb-2">{{ post.body }}</p>
        </article>
      }
    }
  </section>
</main>
