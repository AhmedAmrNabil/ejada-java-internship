<main class="flex flex-col items-center justify-center min-h-screen bg-background text-foreground">
  <h1 class="text-2xl font-bold my-4">Post Detail</h1>
  <section class="p-4 max-w-2xl w-full">
    <article
      class="relative isolate bg-card rounded-lg shadow-md p-4 hover:shadow-lg transition-shadow duration-300"
    >
      @if (post$ | async; as post) {
        <h2 class="text-lg font-semibold mb-2">{{ post.title }}</h2>
        <p class="text-muted-foreground mb-2">{{ post.body }}</p>
      }
    </article>
  </section>
</main>
