server:
  port: 8080

spring:
  application.name: hr-demo
  datasource:
    url: jdbc:oracle:thin:@${DB_HOST}:${DB_PORT}/${DB_SERVICE_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 60000
      max-lifetime: 1800000 # 30 min — matches Hikari default, comfortably > keepaliveTime
      idle-timeout: 600000 # 10 min is more typical too; 60s means idle connections get culled almost immediately

  jpa:
    open-in-view: true
    hibernate.ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
        "[jdbc.fetch_size]": 50

  sql.init:
    mode: never # disable auto schema creation as we are migrating to jpa
    separator: "/"

  messages.basename: "i18n/messages, config.i18n.messages"
  devtools.restart.enabled: true
  web.error.include-stacktrace: never

application-description: HR Management REST API
application-version: 0.0.1

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){faint} %clr(%5p) %clr(%-29.29logger{29}){cyan}: %msg%n"
  file:
    name: ${logging.file.path}/hr-demo.log
    path: logs
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10
  level:
    "[org.springframework.jdbc.core]": TRACE
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate]": INFO

management:
  server:
    port: 9090
  endpoints.web.exposure.include:
    - "*"
