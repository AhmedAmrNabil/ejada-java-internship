
services:
  db:
    build: ./db
    container_name: ${DB_CONTAINER_NAME}
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      - ORACLE_APP_USER=${DB_USERNAME}
      - ORACLE_APP_PWD=${DB_PASSWORD}
      - ORACLE_PWD=${DB_SYSTEM_PASSWORD}
    volumes:
        - db-data:/opt/oracle/oradata

  hr-demo:
    build: ./hr-demo
    container_name: hr-demo
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - DB_HOST=db
      - DB_PORT=1521
      - DB_SERVICE_NAME=${DB_SERVICE_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - hr-demo-logs:/app/logs
    restart: unless-stopped

volumes:
  db-data:
  hr-demo-logs: